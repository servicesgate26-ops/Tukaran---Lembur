<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TUKARAN - LEMBUR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
    }
    
    .iframe-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: white;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Overlay untuk memblokir banner */
    .banner-blocker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background: white;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="iframe-wrapper">
  <div class="banner-blocker"></div>
  <iframe
    id="myiframe"
    src="https://script.google.com/macros/s/AKfycbwTXDg7Rc2E3t8PqO0MOOB83PMwP6Me6ybjzP-iZlM-yoJoC384K6v2JtMEzmzhZp0X/exec"
    sandbox="allow-top-navigation allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-presentation"
    allow="fullscreen; camera; microphone; display-capture; geolocation;">
  </iframe>
</div>

<script>
  // Scroll iframe ke atas untuk menyembunyikan banner
  window.addEventListener('load', function() {
    setTimeout(function() {
      const iframe = document.getElementById('myiframe');
      if (iframe && iframe.contentWindow) {
        try {
          iframe.contentWindow.scrollTo(0, -150);
          iframe.contentWindow.document.documentElement.style.marginTop = '-150px';
          iframe.contentWindow.document.body.style.marginTop = '-150px';
        } catch(e) {
          console.log('Cannot manipulate iframe content (CORS)', e);
        }
      }
    }, 500);
  });

  // Inject CSS ke dalam iframe untuk menyembunyikan banner jika memungkinkan
  window.addEventListener('load', function() {
    setTimeout(function() {
      const iframe = document.getElementById('myiframe');
      if (iframe && iframe.contentWindow && iframe.contentDocument) {
        try {
          const style = iframe.contentDocument.createElement('style');
          style.textContent = `
            /* Sembunyikan banner Google Apps Script */
            div[role="banner"], 
            [aria-label*="Google Apps Script"],
            .goog-inline-block:first-child {
              display: none !important;
            }
            
            body, html {
              margin-top: -150px !important;
              padding-top: 0 !important;
            }
          `;
          iframe.contentDocument.head.appendChild(style);
        } catch(e) {
          console.log('Cannot inject CSS to iframe (CORS)', e);
        }
      }
    }, 1000);
  });
</script>

</body>
</html>

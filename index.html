<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TUKARAN - LEMBUR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
    }

    .iframe-wrapper {
      width: 100%;
      /* Menggunakan tinggi dinamis berbasis viewport mobile yang akurat */
      height: calc(var(--vh, 1vh) * 100);
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      border: none;
      position: absolute;
      left: 0;
      /* Transisi halus saat orientasi layar berubah */
      transition: top 0.1s ease, height 0.1s ease;
    }

    .banner-blocker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 9999;
      pointer-events: all;
      cursor: default;
    }
  </style>
</head>
<body>

<div class="iframe-wrapper">
  <div class="banner-blocker" id="blocker"></div>
  <iframe
    id="myiframe"
    src="https://script.google.com/macros/s/AKfycbwTXDg7Rc2E3t8PqO0MOOB83PMwP6Me6ybjzP-iZlM-yoJoC384K6v2JtMEzmzhZp0X/exec"
    /* Ditambahkan allow-downloads agar sistem download cetak PDF bekerja sempurna */
    sandbox="allow-top-navigation allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-presentation allow-downloads"
    allow="fullscreen; camera; microphone; display-capture; geolocation;">
  </iframe>
</div>

<script>
  // Ukuran tinggi banner Google Script default (biasanya berkisar 65px - 75px)
  // Jika teks atau garis pembatas atas masih mengintip, naikkan ke 70 atau 75
  const BANNER_HEIGHT = 68; 

  function adjustLayout() {
    // 1. Hitung ulang 1% dari tinggi jendela nyata (mengatasi bug address bar mobile browser)
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);

    const iframe  = document.getElementById('myiframe');
    const blocker = document.getElementById('blocker');

    // 2. Terapkan tinggi blocker putih di atas
    blocker.style.height = BANNER_HEIGHT + 'px';

    // 3. Tarik iframe ke atas sejauh BANNER_HEIGHT untuk menyembunyikan banner Google
    iframe.style.top = `-${BANNER_HEIGHT}px`;
    
    // 4. Tambahkan tinggi iframe agar bagian bawah tidak ikut terpotong
    let totalHeight = window.innerHeight + BANNER_HEIGHT;
    iframe.style.height = totalHeight + 'px';
  }

  // Eksekusi saat pertama kali dimuat
  adjustLayout();

  // Dengarkan perubahan ukuran layar (termasuk rotasi HP)
  window.addEventListener('resize', adjustLayout);
  window.addEventListener('orientationchange', adjustLayout);
</script>
</body>
</html>
